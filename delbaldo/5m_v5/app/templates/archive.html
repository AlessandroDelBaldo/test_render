{% extends 'base.html' %}
{% block content %}
  <h1>Archivio post</h1>
  <form method="post">
      <label for="year">Anno: </label>
      <input name="year" id="year" required>
      <label for="year">Mese: </label>
      <input name="month" id="month" required>
      <input type="submit" value="Cerca">
  </form>
  <hr>
  <h2>Risultati per {{ month }}/{{ year }}</h2>

  {% for post in posts %}
    <h3>{{ post['title'] }}</h3>
    <small>Di <strong>{{ post['username']}}</strong> il {{ post['created'].strftime('%Y-%m-%d') }}</small>
    <p>{{ post['body'] }}</p>
    <hr>
    {% endfor %}
  <a href="{{ url_for('main.index')}}">Torna alla home</a>
{% endblock %}
